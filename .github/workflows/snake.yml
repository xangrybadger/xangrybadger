name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-snake.svg?palette=github-light&color_snake=456A4B
            assets/github-snake-dark.svg?palette=github-dark&color_snake=456A4B

      - name: Push to remote
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update snake SVGs [skip ci]"
          file_pattern: assets/github-snake*.svg
