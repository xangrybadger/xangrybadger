name: Update Skyline

on:
  schedule:
    - cron: "0 2 1 1 *"
  workflow_dispatch:
    inputs:
      year:
        description: "Year to generate skyline for"
        required: false
        default: "2025"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install numpy-stl matplotlib pillow

      - name: Install gh-skyline
        run: gh extension install github/gh-skyline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate STL
        run: |
          YEAR="${{ github.event.inputs.year || '2025' }}"
          gh skyline --year "$YEAR" --user "${{ github.repository_owner }}" --output assets/skyline.stl
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Render STL to PNG
        run: python scripts/render_skyline.py
        env:
          STL_PATH: assets/skyline.stl
          PNG_PATH: assets/skyline.png

      - name: Push to remote
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update contribution skyline [skip ci]"
          file_pattern: assets/skyline.png
